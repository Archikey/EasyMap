name: Publish NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore library
        run: dotnet restore EasyMap/EasyMap.csproj

      - name: Restore tests
        run: dotnet restore TestEasyMap/TestEasyMap.csproj

      - name: Build library
        run: dotnet build EasyMap/EasyMap.csproj -c Release --no-restore

      - name: Build tests
        run: dotnet build TestEasyMap/TestEasyMap.csproj -c Release --no-restore

      - name: Run tests
        run: dotnet test TestEasyMap/TestEasyMap.csproj -c Release --no-build

      - name: Pack
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet pack EasyMap/EasyMap.csproj -c Release --no-build -o ./artifacts

      - name: Publish
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate